name: Terraform Module Tests

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - ".github/workflows/terraform-test.yml"
  pull_request:
    branches: [main]

jobs:
  detect-modules:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.list.outputs.modules }}
      any_changed: ${{ steps.changed.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed module dirs
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          dir_names: "true"
          dir_names_max_depth: "2"
          files: modules/**

      - name: Build matrix
        id: list
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          modules=$(echo "${{ steps.changed.outputs.all_changed_files }}" \
            | tr ' ' '\n' \
            | grep '^modules/' \
            | sort -u \
            | jq -R -s -c 'split("\n")[:-1]')
          echo "modules=$modules" >> "$GITHUB_OUTPUT"

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt
        run: terraform fmt -check -recursive modules/

  validate:
    name: Validate / ${{ matrix.module }}
    needs: detect-modules
    if: needs.detect-modules.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Cache providers
        uses: actions/cache@v4
        with:
          path: ${{ matrix.module }}/.terraform
          key: terraform-${{ matrix.module }}-${{ hashFiles(format('{0}/providers.tf', matrix.module)) }}

      - name: terraform init
        run: terraform init -backend=false
        working-directory: ${{ matrix.module }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ matrix.module }}

  docs:
    name: Docs / ${{ matrix.module }}
    needs: detect-modules
    if: needs.detect-modules.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install terraform-docs
        env:
          TFDOCS_VERSION: "0.19.0"
        run: |
          curl -sSLo /tmp/terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v${TFDOCS_VERSION}/terraform-docs-v${TFDOCS_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp terraform-docs
          sudo mv /tmp/terraform-docs /usr/local/bin/terraform-docs

      - name: Regenerate README
        working-directory: ${{ matrix.module }}
        run: |
          cat base.md > README.md
          terraform-docs markdown --hide-empty table . >> README.md

      - name: Check for diff
        run: |
          if ! git diff --exit-code ${{ matrix.module }}/README.md; then
            echo "::error file=${{ matrix.module }}/README.md::README.md is out of date. Run generate-docs.sh --module $(basename ${{ matrix.module }}) and commit the result."
            exit 1
          fi

  summary:
    name: Summary
    needs: [detect-modules, validate, docs]
    if: always() && needs.detect-modules.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Write job summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Terraform Module Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module | Validate | Docs |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------|------|" >> "$GITHUB_STEP_SUMMARY"

          jobs=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --paginate)

          # Collect all module names from both job types
          modules=$(echo "$jobs" \
            | jq -r '.jobs[] | select(.name | test("^(Validate|Docs) / ")) | .name | ltrimstr("Validate / ") | ltrimstr("Docs / ")' \
            | sort -u)

          while IFS= read -r module; do
            validate=$(echo "$jobs" | jq -r --arg m "Validate / $module" '.jobs[] | select(.name == $m) | .conclusion')
            docs=$(echo "$jobs" | jq -r --arg m "Docs / $module" '.jobs[] | select(.name == $m) | .conclusion')

            fmt_cell() { [ "$1" = "success" ] && echo "✅" || echo "❌ $1"; }
            echo "| \`$module\` | $(fmt_cell "$validate") | $(fmt_cell "$docs") |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$modules"
